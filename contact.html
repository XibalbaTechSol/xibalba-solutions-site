<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initiate | Xibalba Solutions</title>
    <link rel="icon" href="./favicon.ico" sizes="any">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <nav>
        <div class="container">
            <a href="index.html" class="logo">
                <img src="./XibalbaSolutionsLogo.png" alt="Xibalba Solutions">
            </a>
            <button class="hamburger" aria-label="Toggle navigation" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-links">
                <a href="index.html">Foundry</a>
                <a href="ai-agents.html">Agents</a>
                <a href="blog.html">Blog</a>
                <a href="local-ai.html">Privacy</a>
                <a href="pricing.html">Support</a>
                <a href="contact.html" class="active btn-outline">Contact</a>
            </div>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1>Project <span class="gradient-text">Initiation</span></h1>
            <p>Tell me about the intelligence you need to build. I review all inquiries personally and will respond within 24 hours.</p>
        </div>
    </header>

    <main class="container content-section">
        <div class="contact-form-container animate-in">
            <form action="https://formspree.io/f/mqegdoyy" method="POST">
                <input type="hidden" name="_next" value="https://xibalbatechsol.github.io/xibalba-solutions-site/thank-you.html">
                
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" class="form-control" required placeholder="Jacob Vickers">
                </div>
                
                <div class="form-group">
                    <label for="email">Technical/Work Email</label>
                    <input type="email" id="email" name="email" class="form-control" required placeholder="founder@company.ai">
                </div>
                
                <div class="form-group">
                    <label for="interest">Primary Interest</label>
                    <select id="interest" name="interest" class="form-control">
                        <option value="custom-agent">Custom Hermes/OpenClaw Agent</option>
                        <option value="local-infra">HIPAA/Sanctum Guard Deployment</option>
                        <li>Ongoing Support & Engineering</li>
                        <option value="audit">Architecture Audit</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="message">Project Requirements (Technical details encouraged)</label>
                    <textarea id="message" name="message" class="form-control" rows="5" placeholder="Define your niche use case, model requirements, and privacy constraints..."></textarea>
                </div>
                
                <button type="submit" class="btn" style="width: 100%;">Initiate Connection</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                &copy; 2026 Xibalba Solutions. Sovereign Intelligence Only.
            </div>
        </div>
    </footer>

    <script src="./js/main.js"></script>
</body>
</html>
