<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initiate | Xibalba Solutions</title>
    <meta name="description" content="Initiate a technical consultation for sovereign AI agent orchestration, custom builds, and private infrastructure deployment.">
    <link rel="icon" href="./favicon.ico" sizes="any">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .form-group { margin-bottom: 2rem; text-align: left; }
        .form-label { display: block; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gray-500); margin-bottom: 0.75rem; font-weight: 600; }
        .form-control { width: 100%; border: 1px solid var(--border-main); background: var(--glass-bg); padding: 1.25rem; border-radius: 12px; color: #fff; font-family: var(--font-secondary), sans-serif; transition: var(--t-smooth); outline: none; }
        .form-control:focus { border-color: var(--color-brand-primary); box-shadow: 0 0 20px var(--color-brand-primary-glow); }
        .contact-form-container { max-width: 600px; margin: 0 auto; background: var(--glass-bg); padding: 4rem; border-radius: 32px; border: 1px solid var(--border-main); backdrop-filter: var(--glass-blur); }
    </style>
</head>
<body class="theme-obsidian">

    <nav>
        <div class="container">
            <a class='logo' href='./index.html'>
                <img src="./XibalbaSolutionsLogo.png" alt="Xibalba Solutions Logo">
            </a>
            <div class="nav-links">
                <a href='./solutions.html'>Solutions</a>
                <a href='./pricing.html'>Pricing</a>
                <a href='./about.html'>About</a>
                <a class='btn-outline active' href='./contact.html' style='padding: 0.5rem 1rem; border-radius: 4px; margin-left: 1rem;'>Contact</a>
            </div>
        </div>
    </nav>

    <header class="page-header">
        <div class="container animate-in">
            <h1>Project <span class="gradient-text">Initiation</span></h1>
            <p style="max-width: 600px; margin: 0 auto;">Secure a technical consultation for your sovereign intelligence requirements. No-code orchestration, custom agents, and trustless swarms.</p>
        </div>
    </header>

    <main class="container content-section" style="text-align: center;">
        <div class="contact-form-container animate-in">
            <form action="thank-you.html" method="GET">
                <div class="form-group">
                    <label class="form-label">Identity / Organization</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g. Sovereign Labs" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Secure Transmission Channel (Email)</label>
                    <input type="email" name="email" class="form-control" placeholder="technical@domain.ai" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Project Scope</label>
                    <select name="interest" class="form-control">
                        <option>Strategic Architecture Build</option>
                        <option>Global Command Center Swarm</option>
                        <option>Sovereign Stack Maintenance</option>
                        <option>Custom AI Integration</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Mission Briefing</label>
                    <textarea class="form-control" rows="4" placeholder="Describe your technical requirements and sovereignty needs..."></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Sync Project</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Xibalba Solutions. All rights reserved. <br>
                <span style="font-size: 0.8rem; color: #444;">Securing Intelligence in the Shadows.</span>
            </p>
        </div>
    </footer>

    <script src="./js/main.js"></script>
</body>
</html>
